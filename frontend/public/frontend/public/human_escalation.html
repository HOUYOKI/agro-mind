<!DOCTYPE html>
<html>
<head>
    <title>Human Escalation</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            width: 500px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: #2e7d32;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 10px;
            font-weight: bold;
        }

        .back-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background: #2e7d32;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        .back-btn:hover {
            background: #1b5e20;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="icon">👨‍🌾</div>

    <h1>Human Expert Support</h1>

    <p>
        Agro-Mind has identified that this case requires additional review.
    </p>

    <p>
        Your request has been successfully escalated to a human agricultural expert.
    </p>

    <div class="status">
        ✅ Escalation Request Submitted
    </div>

    <a href="/" class="back-btn">
        Return to Agro-Mind
    </a>

</div>

</body>
</html>
