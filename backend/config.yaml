# AgroMind Configuration — v4 multimodal ready

llm:
  provider: "ollama"
  model: "qwen2.5:7b-instruct"
  temperature: 0.1
  max_tokens: 1024

embedding:
  provider: "ollama"
  model: "bge-m3"
  dimensions: 1024
  query_prefix: "Represent this query for retrieval: "
  doc_prefix: "Represent this document for retrieval: "
  normalize: true

image:
  model: "ViT-B/32"
  normalize: true

retrieval:
  structured_collection: "agromind_structured_v4"
  full_collection: "agromind_full_v4"
  image_collection: "agromind_images_v4"
  top_k: 5
  confidence_threshold: 0.85
  bm25_weight: 0.4
  vector_weight: 0.6
  hybrid_search:
    enabled: true
    bm25_alpha: 0.4
    rerank_top_k: 3

paths:
  chromadb: "./vision_chromadb"
  data: "./data"
  logs: "./logs"
  escalations_log: "./logs/escalations.jsonl"
  image_cache: "./cache/images"

agent:
  max_retries: 2
  faithfulness_threshold: 0.75
  conversation_window: 4
  multimodal:
    enabled: true
    image_model: "ViT-B/32"

langsmith:
  project: "agromind-local"
  endpoint: "https://api.smith.langchain.com"
  tracing_enabled: true

ollama:
  base_url: "http://localhost:11434"
